# Локальный dev: поднимает только Postgres. Приложение запускается на хосте: npm run dev.
# Прод-compose (Next + Postgres + Caddy рядом с n8n) — в docs/08-deployment-contabo.md.
name: crm-dev

services:
  db:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: crm
      POSTGRES_PASSWORD: crm
      POSTGRES_DB: crm
    ports:
      - "5432:5432"
    volumes:
      - crm_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crm -d crm"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  crm_pgdata: